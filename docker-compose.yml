name: nextcloud-local
services:
  bind9:
    container_name: bind-dns
    image: ubuntu/bind9:latest
    environment:
      - BIND9_USER=root
      - TZ=Europe/London
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - ./dns/config:/etc/bind
      - ./dns/cache:/var/cache/bind
      - ./dns/records:/var/lib/bind
    restart: unless-stopped

  nextcloud-aio-mastercontainer:
    image: ghcr.io/nextcloud-releases/all-in-one:latest
    init: true
    restart: always
    container_name: nextcloud-aio-mastercontainer
    volumes:
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
      - "80:80"
    extra_hosts:
      - "nof.internal:host-gateway"
    environment:
      - APACHE_PORT=11000
      - NEXTCLOUD_DATADIR=/nextcloud-data
      - SKIP_DOMAIN_VALIDATION=true
      - TALK_PORT=3478
      - APACHE_IP_BINDING=127.0.0.1
      - NEXTCLOUD_DOMAIN=nof.internal
      - NEXTCLOUD_OVERWRITECLIURL=https://nof.internal
    networks:
      - nextcloud-local_default

  iredmail:
    image: iredmail/mariadb:stable
    container_name: iredmail
    hostname: mail.nof.internal
    domainname: nof.internal
    restart: always
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993"
      - "110:110"
      - "995:995"
      - "127.0.0.1:8081:80"
    env_file:
      - ./iredmail/iredmail-docker.conf
    volumes:
      - ./iredmail/data/mailboxes:/var/vmail
      - ./iredmail/data/ldap:/var/lib/ldap
      - ./iredmail/data/mysql:/var/lib/mysql
      - ./iredmail/data/clamav:/var/lib/clamav
      - ./iredmail/data/custom:/opt/iredmail/custom
      # CORRECTED: Map to /opt/iredmail/ssl instead of /etc/ssl
      - ./iredmail/data/ssl:/opt/iredmail/ssl 
    networks:
      - nextcloud-local_default

  caddy:
    image: caddy:alpine
    restart: always
    container_name: caddy
    network_mode: "host"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    configs:
      - source: Caddyfile
        target: /etc/caddy/Caddyfile

configs:
  Caddyfile:
    content: |
      {
        local_certs
        auto_https disable_redirects
      }

      nof.internal {
        tls internal
        reverse_proxy localhost:11000
      }

      mail.nof.internal {
        tls internal
        reverse_proxy localhost:8081
      }

networks:
  nextcloud-local_default:
    driver: bridge

volumes:
  nextcloud_aio_mastercontainer:
  caddy_data:
  caddy_config: