name: nextcloud-local
services:
  bind9:
    container_name: bind-dns
    image: ubuntu/bind9:latest
    environment:
      - BIND9_USER=root
      - TZ=Europe/London
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - ./dns/config:/etc/bind
      - ./dns/cache:/var/cache/bind
      - ./dns/records:/var/lib/bind
    restart: unless-stopped
  nextcloud-aio-mastercontainer:
    image: ghcr.io/nextcloud-releases/all-in-one:latest
    init: true
    restart: always
    container_name: nextcloud-aio-mastercontainer
    volumes:
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080" # AIO Interface
      - "80:80"     # HTTP Port
    environment:
      - APACHE_PORT=11000
      - NEXTCLOUD_DATADIR=/nextcloud-data
      # --- KEY CHANGES FOR LOCAL/NON-SSL ---
      - SKIP_DOMAIN_VALIDATION=true
      - TALK_PORT=3478
      - APACHE_IP_BINDING=0.0.0.0
      # -------------------------------------

  caddy:
    image: caddy:alpine
    restart: always
    container_name: caddy
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    network_mode: "host"
    configs:
      - source: Caddyfile
        target: /etc/caddy/Caddyfile

configs:
  Caddyfile:
    content: |
      # Replace 'nof.internal' with your preferred local hostname or IP
      nof.internal:443 {
        tls internal
        reverse_proxy localhost:11000
      }

volumes:
  nextcloud_aio_mastercontainer:
    name: nextcloud_aio_mastercontainer
  # Added missing volume definitions below:
  caddy_data:
  caddy_config: