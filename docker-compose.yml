name: nextcloud-local
services:
  bind9:
    container_name: bind-dns
    image: ubuntu/bind9:latest
    environment:
      - BIND9_USER=root
      - TZ=Europe/London
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - ./dns/config:/etc/bind
      - ./dns/cache:/var/cache/bind
      - ./dns/records:/var/lib/bind
    restart: unless-stopped

  nextcloud-aio-mastercontainer:
    image: ghcr.io/nextcloud-releases/all-in-one:latest
    init: true
    restart: always
    container_name: nextcloud-aio-mastercontainer
    volumes:
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
      - "80:80"
    extra_hosts:
      - "nof.internal:host-gateway" # This tells the container that nof.internal is the host machine
    environment:
      - APACHE_PORT=11000
      - NEXTCLOUD_DATADIR=/nextcloud-data
      - SKIP_DOMAIN_VALIDATION=true
      - TALK_PORT=3478
      - APACHE_IP_BINDING=127.0.0.1
      - NEXTCLOUD_DOMAIN=nof.internal
      - AIO_COMMUNITY_CONTAINERS=
      - NEXTCLOUD_STARTUP_APPS=mail
      # Added this to help Nextcloud understand its own URL for CLI tasks
      - NEXTCLOUD_OVERWRITECLIURL=https://nof.internal
  iredmail:
    image: iredmail/openldap:stable
    container_name: iredmail
    hostname: mail.nof.internal
    domainname: nof.internal
    restart: always
    # We keep network_mode: bridge (default) but map ports to the host
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993"
      - "110:110"
      - "995:995"
      - "127.0.0.1:8081:80" # iRedMail web interface (HTTP) mapped to 8081
    env_file:
      - ./iredmail/iredmail-docker.conf
    volumes:
      - ./iredmail/data/mailboxes:/var/vmail/vmail1
      - ./iredmail/data/ldap:/var/lib/ldap
      - ./iredmail/data/mysql:/var/lib/mysql
      - ./iredmail/data/clamav:/var/lib/clamav
      - ./iredmail/data/custom:/opt/iredmail/custom
      - ./iredmail/data/ssl:/etc/ssl
    networks:
      - nextcloud-local_default

  caddy:
    image: caddy:alpine
    restart: always
    container_name: caddy
    network_mode: "host" # Matches your original file
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile # Mount local file for easier editing

networks:
  nextcloud-local_default:
    external: true